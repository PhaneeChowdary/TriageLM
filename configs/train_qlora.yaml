# Unsloth QLoRA fine-tune, config-driven.
seed: 42

model:
  name: "unsloth/Llama-3.2-3B-Instruct"   # same base as the baseline
  load_in_4bit: true
  max_seq_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

train:
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  num_train_epochs: 1
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 2
  weight_decay: 0.01
  optim: "adamw_8bit"
  packing: false

data:
  train_file: "data/processed/train.jsonl"
  val_file: "data/processed/val.jsonl"

output:
  adapter_dir: "adapters/llama-3.2-3b-triage"
  push_to_hub: true
  hub_repo_id: "phanee5/ticket-triage-llama-3.2-3b-qlora"
  export_gguf: true            # for step-9 re-eval back in Ollama
  gguf_quant: "q4_k_m"

tracking:
  wandb_project: "ticket-triage"
  run_name: null
